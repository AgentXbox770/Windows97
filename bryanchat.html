<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BryanChat - Convites</title>
    <style>
        :root {
            --bg-darker: #111214;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --text-main: #dbdee1;
            --accent: #BF00FF; 
            --green: #23a559;
            --yellow: #f0b232;
            --red: #f23f43;
            --gray: #80848e;
        }
        body { margin:0; background: var(--bg-darker); color: var(--text-main); font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; display:flex; height:100vh; overflow:hidden; }
        
        #sidebar-servers { width:72px; background:var(--bg-darker); display:flex; flex-direction:column; align-items:center; padding-top:12px; flex-shrink:0; overflow-y:auto; gap: 8px; }
        .server-icon { width:48px; height:48px; border-radius:50%; background:#313338; cursor:pointer; display:flex; align-items:center; justify-content:center; overflow:hidden; transition: 0.2s; border: none; }
        .server-icon.active { background-color: var(--accent) !important; border-radius: 30%; }
        .server-icon:hover { background-color: var(--accent); border-radius: 30%; }
        .server-icon img { width: 100%; height: 100%; object-fit: cover; }
        .separator { width: 32px; height: 2px; background: #35363c; border-radius: 1px; margin: 4px 0; }
        .add-server { color: var(--green); border: 1px dashed var(--green); font-size:24px; background: transparent; }

        #left-panel { width:240px; background: var(--bg-sidebar); display:flex; flex-direction:column; flex-shrink:0; border-right:1px solid #202225; }
        .panel-header { padding:12px; font-weight:bold; border-bottom:1px solid #202225; display:flex; justify-content:space-between; align-items:center; height:24px; }
        #channels-list { flex:1; padding:10px; }
        
        #profile-footer { background:#232428; padding:8px; display:flex; align-items:center; gap:8px; height:52px; position: relative; }
        .avatar-wrapper { position: relative; width: 32px; height: 32px; cursor: pointer; }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-badge { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 3px solid #232428; }
        
        #profile-footer .user-info { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 14px; font-weight: bold; }
        .settings-btn { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 18px; opacity: 0.7; }

        #chat { flex:1; display:flex; flex-direction:column; background:var(--bg-chat); }
        #messages { flex:1; padding:16px; overflow-y:auto; }
        .message { display:flex; margin-bottom:16px; align-items: flex-start; }
        .message-avatar { width:40px; height:40px; border-radius:50%; margin-right:16px; object-fit:cover; background: #2b2d31; }
        .chat-image { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 8px; display: block; border: 1px solid #444; }
        
        #friends-sidebar { width:240px; background:var(--bg-sidebar); display:flex; flex-direction:column; flex-shrink:0; border-left:1px solid #202225; }
        .friend-item { display:flex; align-items:center; padding:8px; margin:2px 8px; border-radius:4px; font-size:14px; }
        .friend-item img { width:32px; height:32px; border-radius:50%; margin-right:10px; object-fit:cover; }
        .status-dot { width:10px; height:10px; border-radius:50%; margin-left:auto; border: 2px solid var(--bg-sidebar); }

        .online { background-color: var(--green); }
        .away { background-color: var(--yellow); }
        .dnd { background-color: var(--red); }
        .offline { background-color: var(--gray); }

        #input-container { padding:0 16px 24px; }
        #input-area { background:var(--bg-input); border-radius:8px; display:flex; align-items:center; padding:0 12px; }
        #msg { flex:1; background:transparent; border:none; padding:12px; color:var(--text-main); outline:none; }
        .img-btn { cursor: pointer; font-size: 18px; margin-right: 10px; opacity: 0.7; }

        .modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; }
        .modal-content { background: var(--bg-chat); padding:24px; border-radius:8px; width:350px; color: white; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; background: var(--bg-darker); border: 1px solid #1e1f22; border-radius: 4px; color: white; box-sizing: border-box; }
        .btn-full { width: 100%; padding:10px; background: var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar-servers">
    <div class="server-icon active" id="friends-home-icon" title="Amigos" onclick="location.reload()">
        <img src="https://i.picasion.com/pic93/2eb9f5f7ba2da1a756bf0bf92c01d288.gif">
    </div>
    <div class="separator"></div>
    <div class="server-icon" id="terminalors-fixed-icon" title="Chatting Terminalors" onclick="mudarServidor('chattingterminalors', 'Chatting Terminalors')">
        <img src="https://i.picasion.com/pic93/315860b350e356779d3addbb840e4030.gif">
    </div>
    <div id="server-list-container"></div>
    <div class="server-icon add-server" title="Criar Servidor" onclick="window.openModal('create-server-modal')">+</div>
    <div class="server-icon add-server" title="Entrar em Servidor" onclick="window.openModal('join-server-modal')">🔗</div>
</div>

<div id="left-panel">
    <div class="panel-header"><span id="current-server-name">Início</span></div>
    <div id="channels-list"><div style="background:#3f4147;padding:8px;border-radius:4px;color:white;font-size:14px;"># geral</div></div>
    <div id="profile-footer">
        <div class="avatar-wrapper" onclick="window.openModal('edit-profile-modal')">
            <img id="my-avatar" src="">
            <div id="my-status-badge" class="status-badge online"></div>
        </div>
        <div class="user-info" id="my-name">Carregando...</div>
        <button class="settings-btn" onclick="window.openModal('edit-profile-modal')">⚙️</button>
    </div>
</div>

<div id="chat">
    <div id="messages"></div>
    <div id="input-container">
        <div id="input-area">
            <span class="img-btn" title="Enviar Imagem" onclick="promptImagem()">🖼️</span>
            <input type="text" id="msg" placeholder="Selecione um servidor..." disabled>
            <button id="send-btn" style="background:none;border:none;color:white;cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<div id="friends-sidebar">
    <div class="panel-header">Online — <span id="friend-count">0</span></div>
    <div id="friends-list"></div>
</div>

<div id="create-server-modal" class="modal">
    <div class="modal-content">
        <h2>Criar Novo Servidor</h2>
        <input type="text" id="new-server-name" placeholder="Nome do servidor">
        <input type="text" id="new-server-pfp" placeholder="URL do ícone (opcional)">
        <button class="btn-full" onclick="window.criarServidor()">Criar</button>
        <button class="btn-full" style="background:#4e5058" onclick="window.closeModals()">Cancelar</button>
    </div>
</div>

<div id="join-server-modal" class="modal">
    <div class="modal-content">
        <h2>Entrar em um Servidor</h2>
        <p style="font-size:12px; color:#aaa;">Peça o ID do servidor para um amigo.</p>
        <input type="text" id="join-id" placeholder="Ex: srv_123456">
        <button class="btn-full" onclick="window.entrarServidor()">Entrar</button>
        <button class="btn-full" style="background:#4e5058" onclick="window.closeModals()">Cancelar</button>
    </div>
</div>

<div id="edit-profile-modal" class="modal">
    <div class="modal-content">
        <h2>Configurações</h2>
        <input type="text" id="edit-name">
        <input type="text" id="edit-pfp">
        <select id="edit-status">
            <option value="online">Online</option>
            <option value="away">Ausente</option>
            <option value="dnd">Ocupado</option>
            <option value="offline">Invisível</option>
        </select>
        <button class="btn-full" onclick="window.saveProfile()">Salvar</button>
        <button class="btn-full" style="background:#4e5058" onclick="window.closeModals()">Cancelar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, off, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

const configG = { apiKey: "AIzaSyA6naVVLMuVoYClK3kRl7Cbd8KjM36XToU", databaseURL: "https://discord-dc68a-default-rtdb.firebaseio.com" };
const configT = { apiKey: "AIzaSyBHQIBxspDo0eF5aDA80FMziFB9Oo03jC8", databaseURL: "https://chattingterminalors-default-rtdb.firebaseio.com" };

const appG = initializeApp(configG);
const dbG = getDatabase(appG);
const appT = initializeApp(configT, "terminalors");
const dbT = getDatabase(appT);

let userId = localStorage.getItem("userId") || "user_" + Math.random().toString(36).substr(2,9);
localStorage.setItem("userId", userId);
let currentUser = localStorage.getItem("username") || "Usuário";
let currentPfp = localStorage.getItem("pfp") || "https://cdn.discordapp.com/embed/avatars/0.png";
let currentStatus = localStorage.getItem("userStatus") || "online";
let userServers = JSON.parse(localStorage.getItem("my_servers") || '[]');
let currentServerId = null;

// FUNÇÕES DE SERVIDOR
window.criarServidor = () => {
    const nome = document.getElementById('new-server-name').value;
    const pfp = document.getElementById('new-server-pfp').value || "https://cdn.discordapp.com/embed/avatars/1.png";
    if(!nome) return alert("Dê um nome ao servidor!");
    
    const srvId = "srv_" + Math.random().toString(36).substr(2,9);
    const novoSrv = { id: srvId, name: nome, avatar: pfp };
    
    // Salva no Banco Global para outros poderem entrar
    set(ref(dbG, `server_directory/${srvId}`), novoSrv);
    
    userServers.push(novoSrv);
    localStorage.setItem("my_servers", JSON.stringify(userServers));
    window.closeModals();
    carregarServidores();
    alert("Servidor criado! ID para convite: " + srvId);
};

window.entrarServidor = async () => {
    const id = document.getElementById('join-id').value.trim();
    if(!id) return;
    
    const snapshot = await get(ref(dbG, `server_directory/${id}`));
    if(snapshot.exists()){
        if(userServers.find(s => s.id === id)) return alert("Você já está nesse servidor!");
        userServers.push(snapshot.val());
        localStorage.setItem("my_servers", JSON.stringify(userServers));
        carregarServidores();
        window.closeModals();
    } else {
        alert("Servidor não encontrado!");
    }
};

window.openModal = (id) => {
    if(id === 'edit-profile-modal') {
        document.getElementById('edit-name').value = currentUser;
        document.getElementById('edit-pfp').value = currentPfp;
    }
    document.getElementById(id).style.display = 'flex';
};
window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');

window.saveProfile = () => {
    currentUser = document.getElementById('edit-name').value || currentUser;
    currentPfp = document.getElementById('edit-pfp').value || currentPfp;
    currentStatus = document.getElementById('edit-status').value;
    localStorage.setItem("username", currentUser);
    localStorage.setItem("pfp", currentPfp);
    localStorage.setItem("userStatus", currentStatus);
    updateProfileUI();
    window.closeModals();
};

function updateProfileUI() {
    document.getElementById("my-name").textContent = currentUser;
    document.getElementById("my-avatar").src = currentPfp;
    document.getElementById("my-status-badge").className = "status-badge " + currentStatus;
    set(ref(dbG, 'status/' + userId), { name: currentUser, pfp: currentPfp, status: currentStatus });
}

function carregarServidores() {
    const container = document.getElementById("server-list-container");
    container.innerHTML = "";
    document.getElementById('terminalors-fixed-icon').classList.toggle('active', currentServerId === 'chattingterminalors');
    
    userServers.forEach(srv => {
        const div = document.createElement("div");
        div.className = `server-icon ${currentServerId === srv.id ? 'active' : ''}`;
        div.innerHTML = `<img src="${srv.avatar}">`;
        div.onclick = () => window.mudarServidor(srv.id, srv.name);
        div.title = srv.name;
        container.appendChild(div);
    });
}

window.mudarServidor = (id, name) => {
    if (currentServerId) {
        off(ref(dbG, `servers/${currentServerId}/messages`));
        off(ref(dbT, `chattingterminalors/messages`));
    }
    currentServerId = id;
    document.getElementById("current-server-name").textContent = name;
    document.getElementById("messages").innerHTML = "";
    document.getElementById("msg").disabled = false;
    document.getElementById("msg").placeholder = "Conversar em " + name;
    carregarServidores();

    const database = (id === "chattingterminalors") ? dbT : dbG;
    const path = (id === "chattingterminalors") ? `chattingterminalors/messages` : `servers/${id}/messages`;

    onChildAdded(ref(database, path), (snap) => {
        const m = snap.val();
        const div = document.createElement("div");
        div.className = "message";
        const avatar = m.pfp || "https://cdn.discordapp.com/embed/avatars/0.png";
        const isImage = /\.(jpg|jpeg|png|webp|gif)$/i.test(m.text);
        const content = isImage ? `<img src="${m.text}" class="chat-image">` : `<div>${m.text}</div>`;

        div.innerHTML = `<img class="message-avatar" src="${avatar}"><div><span style="font-weight:bold">${m.user || m.name}</span>${content}</div>`;
        document.getElementById("messages").appendChild(div);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });
};

window.promptImagem = () => {
    const url = prompt("Link da imagem:");
    if (url) { document.getElementById("msg").value = url; document.getElementById("send-btn").click(); }
};

document.getElementById("send-btn").onclick = () => {
    const input = document.getElementById("msg");
    if(!input.value.trim()) return;
    const isT = currentServerId === "chattingterminalors";
    push(ref(isT ? dbT : dbG, isT ? `chattingterminalors/messages` : `servers/${currentServerId}/messages`), {
        [isT ? "name" : "user"]: currentUser, pfp: currentPfp, text: input.value
    });
    input.value = "";
};

document.getElementById("msg").onkeydown = e => { if (e.key === "Enter") document.getElementById("send-btn").click(); };

onValue(ref(dbG, 'status'), (snap) => {
    const list = document.getElementById("friends-list");
    list.innerHTML = "";
    let count = 0;
    snap.forEach(child => {
        const data = child.val();
        if(data.status === 'offline' && child.key !== userId) return;
        const div = document.createElement("div");
        div.className = "friend-item";
        div.innerHTML = `<img src="${data.pfp}"> <span>${data.name}</span> <div class="status-dot ${data.status || 'online'}"></div>`;
        list.appendChild(div);
        if(data.status !== 'offline') count++;
    });
    document.getElementById('friend-count').textContent = count;
});

onDisconnect(ref(dbG, 'status/' + userId)).update({ status: 'offline' });
updateProfileUI();
carregarServidores();
</script>
</body>
</html>
