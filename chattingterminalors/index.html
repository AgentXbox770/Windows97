#output {

@keyframes rainbow {
  0% { color: #ff0000; }
  25% { color: #ffff00; }
  50% { color: #00ff00; }
  75% { color: #00ffff; }
  100% { color: #ff0000; }

@keyframes dotPulse {

/* ---------- SECURITY: ESCAPE HTML ---------- */
function escapeHTML(str) {
  const p = document.createElement("p");
  p.textContent = str;
  return p.innerHTML;
}

/* ---------- UTILS ---------- */
function censor(text) {
  badWords.forEach(w => {
    text = text.replace(new RegExp(w, "gi"), "####");
  });
  return text;
}

function randomColor() {
  return `hsl(${Math.random()*360},70%,60%)`;
}

function getFormattedTime(timestamp) {
  const date = timestamp ? new Date(timestamp) : new Date();
  const hrs = date.getHours().toString().padStart(2, '0');
  const mins = date.getMinutes().toString().padStart(2, '0');
  return `[${hrs}:${mins}]`;
}

function botMsg(text) {
  const line = document.createElement("div");
  line.style.margin = "2px 0";
  const time = getFormattedTime();
  // Safe bot message rendering
  line.innerHTML = `<span class="timestamp">${time}</span><span style="color:#00ff00">System32 [/]</span>: ${escapeHTML(text).replace(/\n/g, '<br>')}`;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function formatUptime(ms) {
  if (ms < 0) ms = 0; 
  const seconds = Math.floor((ms / 1000) % 60);
  const minutes = Math.floor((ms / (1000 * 60)) % 60);
  const hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
  const days = Math.floor(ms / (1000 * 60 * 60 * 24));
  return `${days} days, ${hours} hours, ${minutes} minutes`;
}

/* ---------- LINK LOGIC ---------- */
function parseMessage(text) {
  let safeText = escapeHTML(text);
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return safeText.replace(urlRegex, (url) => {
    return `<a href="${url}" target="_blank" class="chat-link">${url}</a>`;
  });
}

db.ref("chattingterminalors/messages")

/* ---------- INPUT ---------- */
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && input.value.trim()) {
    const val = input.value.trim();
    
    // RESTORED FULL COMMAND LOGIC
    if (val === "/help") {
      botMsg(
        "/help - shows this message\n" +
        "/color [color] - set your username color (or 'rainbow')\n" +
        "/name [new username] - set a new username for you.\n" +
        "/info - see info of website.\n" +
        "/uptime - shows how long the website is public.\n" +
        "/clear - clear all messages (local)\n" +
        "/reset - resets your connection.\n" +
        (username === "👑AgentXbox👑" ? "/lockdown - Toggle chat restriction.\n" : "") +
        "\nBot officially created by Agentxbox, Createz."
      );
    } 
    else if (val === "/lockdown" && username === "👑AgentXbox👑") {
      const newState = !isLockdownActive;
      db.ref("chattingterminalors/settings/lockdown").set(newState);
      if (newState) {
        db.ref("chattingterminalors/messages").push({
          name: "System32 [/]",
          color: "#00ff00",
          text: "The chat has been locked down due to maintenance.",
          time: Date.now()
        });
      } else {
        botMsg("Lockdown lifted. Everyone can chat again.");
      }
    }
    else if (val === "/info") {
      botMsg("ChattingTerminalors built in HTML and CSS and JS with Google Firebase and Github Pages.");
    }
    else if (val === "/uptime") {
      const diff = Date.now() - launchDate;
      botMsg("Website Uptime: " + formatUptime(diff));
    }
    else if (val === "/clear") {
      output.innerHTML = "ChattingTerminalors\n-------------------\nGlobal terminal chat\nType /help for commands\n";
    }
    else if (val === "/reset") {
      botMsg("Resetting connection...");
      setTimeout(() => location.reload(), 1000);
    }
    else if (val.startsWith("/color ")) {
      const newCol = val.split(" ")[1];
      if(newCol) {
        color = newCol;
        localStorage.setItem("ct_color", color);
        userRef.update({ color: color });
        botMsg("Your color has been changed to " + newCol + ".");
      }
    }
    else if (val.startsWith("/name ")) {
      const parts = val.split(" ");
      const newName = parts.slice(1).join(" ");
      if (!newName || newName.includes("/")) {
          botMsg("Invalid name.");
      } else {
          db.ref("chattingterminalors/users").once("value", snap => {
            let taken = false;
            snap.forEach(child => {
              if (child.val().name?.toLowerCase() === newName.toLowerCase()) taken = true;

              userRef.update({ name: username });
              botMsg("Your username has been changed to " + newName + ".");

    else {
      db.ref("chattingterminalors/messages").push({
        name: username,
        color: color,
        text: censor(val),
        time: Date.now()
      });

    input.value = "";

/* ---------- EMOTICON LOGIC FOR GITHUB ---------- */
const emoticons = {
  ":tree:": "tree.png",
  ":plsss:": "plsss.png",
  ":icant:": "icant.gif",
  ":skull:": "rotatingskull.gif",
  ":shocked:": "kryonax.gif",

};

// Hook into the existing message parser
const originalParseMessage = parseMessage;

parseMessage = function(text) {
  let html = originalParseMessage(text);
  
  Object.keys(emoticons).forEach(code => {
    const imgFile = emoticons[code];
    const regex = new RegExp(code, "g");
    // height: 1.2em makes the emoji scale perfectly with your font size
    html = html.replace(regex, `<img src="${imgFile}" alt="${code}" style="height:1.2em; vertical-align:middle; image-rendering: pixelated;">`);
  });
  
  return html;
};
  
/* ---------- LOREMIPSUMDOLOR.BOT [LR] - CLEAN VERSION ---------- */
const lrName = "loremipsumdolor.bot [lr]";
const lrColor = "#6600FF"; // Electric Indigo

const loremLines = [
  "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
  "Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
  "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.",
  "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum.",
  "Excepteur sint occaecat cupidatat non proident, sunt in culpa qui.",

  "Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet.",
  "Ut foreshadowing enim ad minima veniam, quis nostrum exercitationem."
];

db.ref("chattingterminalors/messages").limitToLast(1).on("child_added", (snap) => {
    const msg = snap.val();
    if (msg.name === lrName) return;

    const input = msg.text.toLowerCase().trim();

    // 1. Help Command (Removed exclamation mark)
    if (input === "lrhelp") {
        sendLrResponse("Commands: lr[1-8] (Generate lines), lrhelp (This menu).");
    }

    // 2. Logic for Lorem Lines (lr1, lr2, etc.)
    else if (/^lr\d+$/.test(input)) {
        const count = parseInt(input.replace("lr", ""));
        if (count > 0) {
            const finalCount = Math.min(count, 8); 
            let response = "";
            for (let i = 0; i < finalCount; i++) {
                response += loremLines[i] + " ";
            }
            sendLrResponse(response.trim());
        }
    }
});

function sendLrResponse(text) {
    db.ref("chattingterminalors/messages").push({
        name: lrName,
        color: lrColor,
        text: text,
        time: Date.now()
    });
}

const originalChildAdded = db.ref("chattingterminalors/messages").on;

    if (eventType === 'child_added') {

function checkGhostTime() {
    const now = new Date();
    if (now.getHours() === 3 && now.getMinutes() === 33) {
        const ghost = document.createElement('div');
        ghost.innerHTML = '👻';
        ghost.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: -50px;
            font-size: 40px;
            opacity: 0.4;
            z-index: 9999;
            pointer-events: none;
            animation: floatGhost 2s linear forwards;
        `;
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatGhost {
                0% { left: -50px; opacity: 0.4; transform: translateY(0); }
                25% { transform: translateY(-10px); }
                50% { transform: translateY(10px); }
                75% { transform: translateY(-5px); }
                100% { left: 100%; opacity: 0; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
        document.body.appendChild(ghost);
        
        setTimeout(() => ghost.remove(), 2000);
    }
}

function updateClock() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const timeString = `${hours}:${minutes}`;
    
    clock.textContent = timeString;
    
    if (hours === '03' && minutes === '33') {
        clock.style.color = '#ff0000';
        clock.style.textShadow = '0 0 5px rgba(255,0,0,0.5)';
    } else {
        clock.style.color = 'white';
        clock.style.textShadow = 'none';
    }
}

setInterval(updateClock, 1000);
updateClock();

// Suporte a imagens por URL no chat
db.ref("chattingterminalors/messages")
  .limitToLast(100)
  .on("child_added", snap => {
    const m = snap.val();
    const line = document.createElement("div");
    line.style.marginBottom = "6px";

    let textContent = escapeHTML(m.text || "");

    // Detecta URLs de imagem no texto
    const imageRegex = /(https?:\/\/[^\s]+\.(png|jpg|jpeg|gif|webp))/gi;
    const images = textContent.match(imageRegex) || [];

    let imgHtml = "";
    if (images.length > 0) {
      images.forEach(url => {
        imgHtml += `<img src="${url}" class="chat-image" alt="Imagem enviada" onerror="this.style.display='none';">`;
      });
      textContent = textContent.replace(imageRegex, ''); // remove URL do texto pra não duplicar
    }

    line.innerHTML = `<span class="timestamp">[${getTime()}]</span> 
<span style="color:${m.color}">${escapeHTML(m.name)}</span>: ${textContent}${imgHtml}`;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  });

function replaceAllEmojis() {
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
  let node;

  while(node = walker.nextNode()) {
    let text = node.nodeValue;
    // Regex to match all emojis
    const emojiRegex = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/gu;
    if(text.match(emojiRegex)) {
      const replaced = text.replace(emojiRegex, emoji => {
        // Discord/Roblox mapping if you have it
        const customMap = {
          "😀": "https://cdn.discordapp.com/emojis/123456789012345678.png",
          "😂": "https://cdn.discordapp.com/emojis/234567890123456789.png",
        };
        if(customMap[emoji]) return `<img src="${customMap[emoji]}" alt="${emoji}" class="custom-emoji">`;
        // Fallback to Twemoji
        const codepoint = Array.from(emoji).map(c => c.codePointAt(0).toString(16)).join('-');
        return `<img src="https://twemoji.maxcdn.com/v/latest/72x72/${codepoint}.png" alt="${emoji}" class="custom-emoji">`;
      });
      const span = document.createElement("span");
      span.innerHTML = replaced;
      node.parentNode.replaceChild(span, node);
    }
  }
}

`;

window.addEventListener('DOMContentLoaded', replaceAllEmojis);
